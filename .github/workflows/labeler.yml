# PR Labeler
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _labeler.yml

name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    uses: qws941/.github/.github/workflows/_labeler.yml@master
