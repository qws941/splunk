# OpenCode Writeback
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _opencode-writeback.yml

name: OpenCode Writeback

on:
  repository_dispatch:
    types:
      - opencode.task.started
      - opencode.task.progress
      - opencode.task.blocked
      - opencode.task.done
      - opencode.pr.created

permissions:
  contents: read
  issues: write

concurrency:
  group: opencode-writeback-${{ github.event.client_payload.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  writeback:
    uses: qws941/.github/.github/workflows/_opencode-writeback.yml@master
    secrets: inherit
