# Issue Duplicate Detection
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _issue-duplicate.yml

name: Issue Duplicate Detection

on:
  issues:
    types: [opened, edited]

concurrency:
  group: issue-duplicate-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write

jobs:
  duplicate:
    uses: qws941/.github/.github/workflows/_issue-duplicate.yml@master
